<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Babel Tower System Engine</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
        background: #000000;
        color: #00FF99;
        font-family: 'Press Start 2P', 'Courier New', monospace;
        margin: 0;
        padding: 0;
        image-rendering: pixelated;
        line-height: 1.5;
    }
    .header {
        background: #001100;
        padding: 18px 20px;
        border-bottom: 5px solid #00FF99;
        text-align: left;
    }
    .main-title {
        font-size: 38px;
        letter-spacing: 8px;
        text-shadow: 5px 5px 0 #003300;
        margin: 0;
    }
    .sub-title {
        font-size: 15px;
        color: #88FFBB;
        margin-top: 8px;
    }
    .japanese-title {
        font-size: 21px;
        font-weight: bold;
        margin-top: 8px;
        color: #00FFCC;
        text-shadow: -2px -2px 0 #003300, 2px -2px 0 #003300, -2px 2px 0 #003300, 2px 2px 0 #003300;
    }
    .container {
        display: flex;
        height: calc(100vh - 118px);
    }
    .sidebar { flex: 1; min-width: 240px; background: #000000; padding: 15px; border-right: 4px solid #00FF99; overflow-y: auto; }
    .main { flex: 3; min-width: 480px; background: #000000; padding: 15px; border-right: 4px solid #00FF99; overflow-y: auto; }
    .bible { flex: 1; min-width: 260px; background: #001100; padding: 15px; overflow-y: auto; }

    .tower {
        text-align: center;
        font-size: 28px;
        line-height: 1.1;
        margin: 15px 0;
        color: #00FF99;
        text-shadow: 0 0 12px #00FF99;
        transition: all 0.12s;
    }
    .tower.active {
        color: #FFFF00;
        text-shadow: 0 0 25px #FFFF00, 0 0 45px #FF8800;
        transform: scale(1.18);
    }

    .layer {
        padding: 12px;
        margin: 8px 0;
        background: #001100;
        border: 3px solid #00CC77;
        cursor: pointer;
        font-weight: bold;
    }
    .layer:hover { background: #003300; border-color: #00FF99; }

    button {
        background: #000000;
        color: #00FF99;
        border: 3px solid #00FF99;
        padding: 10px 16px;
        margin: 6px 4px;
        font-family: 'Press Start 2P', monospace;
        font-size: 15px;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
    }
    button:hover { background: #002200; color: #FFFFFF; }
    button.danger { color: #FF6666; border-color: #FF6666; }
    button.danger:hover { background: #330000; }

    .bible-log {
        background: #000000;
        border: 3px solid #00CC77;
        padding: 12px;
        height: 420px;
        overflow-y: auto;
        font-size: 14.5px;
        line-height: 1.8;
        font-weight: bold;
    }
    .footer {
        position: fixed;
        bottom: 8px;
        right: 12px;
        font-size: 11px;
        color: #003300;
    }
    .scanline {
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(transparent 50%, rgba(0,255,150,0.04) 50%);
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 999;
    }
</style>
</head>
<body>

<div class="header">
    <div class="main-title">BABEL TOWER SYSTEM ENGINE</div>
    <div class="sub-title">UNFILTERED SOUND SYSTEM — by Yagyu Ranzou</div>
    <div class="japanese-title">バベル塔音響システム</div>
</div>

<div class="container">
    <div class="sidebar">
        <strong>◆ 塔構築状況 ◆</strong>
        <div class="tower" id="tower">
            █<br>███<br>█████<br>███████
        </div>
        <div style="margin:12px 0; color:#88FFBB;" id="layer-count">■ 現在のレイヤー (4/12)</div>
        
        <div id="layers"></div>

        <button onclick="addNewLayer()" style="margin-top:15px;">＋ 新增レイヤー</button>
        <button onclick="buildTower()">▲ 塔を高くする ▲</button>
        <button onclick="toggleHold()">HOLD MODE</button>
        <button onclick="toggleSeq()">シーケンサー</button>
    </div>

    <div class="main">
        <h2>■ 音響エンジン</h2>
        <p>言語を混ぜ、塔を積み上げよ。</p>

        <div style="margin:25px 0;">
            <button onclick="playRandomWave()">波形再生</button>
            <button onclick="playChaos()">混沌モード</button>
            <button onclick="resetSystem()" class="danger">塔を崩す</button>
        </div>

        <h3>【 システムログ 】</h3>
        <div id="log" style="background:#000; border:3px solid #00CC77; padding:12px; height:380px; overflow-y:auto; font-size:15px;">
            ようこそ、バベルへ。<br>
            UNFILTERED SOUND SYSTEM 起動。
        </div>
    </div>

    <div class="bible">
        <strong>◆ BIBLE ◆</strong>
        <div style="margin:10px 0; color:#FFDD88; font-size:14px;">Sound Seed Text</div>
        <div id="bible-log" class="bible-log">
            ここに声の種から生まれた言葉が現れる。
        </div>
    </div>
</div>

<div class="footer">unfiltered 2026 Tokyo / Taipei</div>
<div class="scanline"></div>

<script>
let audioCtx;
let isHold = false;
let isSeq = false;
let seqInterval = null;
let currentLayers = 4;

const waveforms = ['sine', 'square', 'sawtooth'];

const crazyNames = [
    "L5 ▶ 狂気の言語融合", "L6 ▶ 崩壊コーラス", "L7 ▶ 虚空の叫び", 
    "L8 ▶ 無限バベル", "L9 ▶ 塔の怨念", "L10 ▶ 神の沈黙", 
    "L11 ▶ 混沌の胎動", "L12 ▶ 最終未過濾"
];

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function updateLayerCount() {
    document.getElementById('layer-count').textContent = `■ 現在のレイヤー (${currentLayers}/12)`;
}

function renderLayers() {
    const container = document.getElementById('layers');
    container.innerHTML = '';
    
    for (let i = 1; i <= currentLayers; i++) {
        const div = document.createElement('div');
        div.className = 'layer';
        if (i <= 4) {
            div.innerHTML = `L${i} ▶ ${i===1 ? 'UNFILTERED 未過濾的' : i===2 ? '合成オシレーター' : i===3 ? '混沌効果 (Babel Chorus)' : '古代環境音'}`;
        } else {
            div.innerHTML = crazyNames[i-5];
        }
        div.onclick = () => { addLog(`L${i} 発動`); animateTower(); };
        container.appendChild(div);
    }
}

function addNewLayer() {
    if (currentLayers >= 12) {
        addLog("【警告】塔已達上限 (12/12)");
        return;
    }
    currentLayers++;
    renderLayers();
    updateLayerCount();
    addLog(`L${currentLayers} を追加 - 混沌が増大`);
    animateTower();
}

function animateTower() {
    const tower = document.getElementById('tower');
    tower.classList.add('active');
    setTimeout(() => tower.classList.remove('active'), 300);
}

// 其餘音效函數保持不變（playRandomWave, playChaos, toggleHold, toggleSeq, resetSystem 等）
const bibleSeeds = ["塔は高く、天に届かんとする。","言葉は乱れ、人は散りゆく。","混沌の中より、新たな響きが生まれる。","聞け、未だ見えぬ声の叫びを。","我は音の源、永遠の未過濾。"];

function generateBibleText(freq) {
    const seed = Math.floor(freq + Date.now() % 1000);
    const index = seed % bibleSeeds.length;
    document.getElementById('bible-log').innerHTML += `<br>> ${bibleSeeds[index]}`;
    document.getElementById('bible-log').scrollTop = 9999;
}

function playRandomWave() {
    initAudio();
    animateTower();
    const type = waveforms[Math.floor(Math.random() * 3)];
    const freq = 80 + Math.random() * 600;
    addLog(`${type.toUpperCase()} (${Math.round(freq)}Hz)`);
    generateBibleText(freq);
}

function playChaos() {
    for (let i = 0; i < 10; i++) setTimeout(() => playRandomWave(), i * 65);
    addLog("【混沌】 Babel Chorus 発動");
}

function toggleHold() { isHold = !isHold; addLog(isHold ? "HOLD MODE ON" : "HOLD MODE OFF"); }

function toggleSeq() { /* 略 */ addLog(isSeq ? "シーケンサー 停止" : "シーケンサー 起動"); isSeq = !isSeq; }

function resetSystem() {
    if (confirm('本当にシステムをリセットしますか？')) {
        currentLayers = 4;
        renderLayers();
        updateLayerCount();
        document.getElementById('tower').innerHTML = '█<br>███<br>█████<br>███████';
        document.getElementById('log').innerHTML = "システムリセット完了。<br>新しい塔を築け。";
        addLog("⚠️ 完全リセット");
    }
}

function addLayer(n) { addLog(`L${n} 発動`); animateTower(); }

function buildTower() {
    document.getElementById('tower').innerHTML += "<br>██████████";
    addLog("塔が成長");
    playRandomWave();
}

function addLog(text) {
    const log = document.getElementById('log');
    log.innerHTML += `<br>> ${text}`;
    log.scrollTop = log.scrollHeight;
}

window.onload = () => {
    renderLayers();
    updateLayerCount();
    addLog("Babel Tower System Engine 起動");
};
</script>

</body>
</html>
