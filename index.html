<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Babel Tower System Engine</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
        background: #000000;
        color: #00FF99;
        font-family: 'Press Start 2P', cursive;
        margin: 0;
        padding: 0;
        image-rendering: pixelated;
        line-height: 1.5;
        overflow: hidden;
    }

    .header {
        background: #001100;
        padding: 18px 20px;
        border-bottom: 5px solid #00FF99;
    }
    .main-title {
        font-size: 38px;
        letter-spacing: 8px;
        text-shadow: 5px 5px 0 #003300;
        margin: 0;
    }
    .sub-title {
        font-size: 15px;
        color: #88FFBB;
        margin-top: 8px;
    }
    .japanese-title {
        font-size: 21px;
        font-weight: bold;
        margin-top: 8px;
        color: #00FFCC;
        text-shadow: -2px -2px 0 #003300, 2px -2px 0 #003300, -2px 2px 0 #003300, 2px 2px 0 #003300;
    }

    .container {
        display: flex;
        height: calc(100vh - 118px);
    }
    .sidebar { flex: 1; min-width: 240px; background: #000000; padding: 15px; border-right: 4px solid #00FF99; overflow-y: auto; }
    .main { flex: 3; min-width: 480px; background: #000000; padding: 15px; border-right: 4px solid #00FF99; overflow-y: auto; }
    .bible { flex: 1; min-width: 260px; background: #001100; padding: 15px; overflow-y: auto; }

    .tower-box {
        height: 180px;
        border: 3px solid #003300;
        margin: 15px 0;
        overflow-y: auto;
        background: #000500;
    }
    .tower {
        text-align: center;
        font-size: 28px;
        line-height: 1.1;
        color: #00FF99;
        text-shadow: 0 0 12px #00FF99;
        transition: all 0.1s;
    }
    .tower.active { color: #FFFF00; text-shadow: 0 0 25px #FFFF00; transform: scale(1.05); }

    .button-row {
        display: flex;
        gap: 10px;
        margin: 25px 0;
    }
    .button-row button { flex: 1; }

    .layer {
        padding: 12px; margin: 8px 0;
        background: #001100; border: 3px solid #00CC77;
        cursor: pointer; font-weight: bold; font-size: 11px;
    }
    .layer:hover { background: #003300; border-color: #00FF99; }

    button {
        background: #000000; color: #00FF99; border: 3px solid #00FF99;
        padding: 10px 16px; margin: 6px 0; width: 100%;
        font-family: 'Press Start 2P', cursive; font-size: 13px; cursor: pointer;
    }
    button:hover { background: #002200; color: #fff; }
    button.active { background: #00FF99 !important; color: #000 !important; }
    button.danger { color: #FF6666; border-color: #FF6666; }

    #log {
        background: #000;
        border: 3px solid #00CC77;
        padding: 12px;
        height: 380px;
        overflow-y: auto;
        font-size: 15px;
        color: #00FF99;
        font-family: 'Press Start 2P', cursive;
        line-height: 1.8;
    }

    .bible-log {
        background: #000000; border: 3px solid #00CC77;
        padding: 12px; height: 420px; overflow-y: auto;
        font-size: 14.5px; line-height: 1.8; color: #FFDD88;
        font-family: 'Press Start 2P', cursive;
    }

    .footer { position: fixed; bottom: 8px; right: 12px; font-size: 11px; color: #003300; }
    .scanline {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(transparent 50%, rgba(0,255,150,0.04) 50%);
        background-size: 100% 4px; pointer-events: none; z-index: 999;
    }
    .caption { font-size: 10px; color: #55AA88; margin-top: -10px; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="header">
    <div class="main-title">BABEL TOWER SYSTEM ENGINE</div>
    <div class="sub-title">UNFILTERED SOUND SYSTEM — by Yagyu Ranzou</div>
    <div class="japanese-title">バベル塔音響システム</div>
</div>

<div class="container">
    <div class="sidebar">
        <strong>◆ 塔構築状況 ◆</strong>
        <div class="tower-box" id="tower-scroll">
            <div class="tower" id="tower">█<br>███<br>█████<br>███████</div>
        </div>
        <div style="margin:12px 0; color:#88FFBB; font-size: 11px;" id="layer-count">■ 現在のレイヤー (4/12)</div>
        
        <div id="layers"></div>

        <button onclick="addNewLayer()" style="margin-top:15px;">＋ 新規レイヤー追加</button>
        <button onclick="buildTower()">▲ 塔をさらに高く ▲</button>
        <button onclick="toggleHold()" id="hold-btn">HOLD MODE</button>
        <button onclick="toggleSeq()" id="seq-btn">シーケンサー</button>
    </div>

    <div class="main">
        <h2>■ 音響エンジン</h2>
        <div class="caption">言語を混ぜ、塔を積み上げよ</div>
        <div class="button-row">
            <button onclick="playRandomWave()">波形再生</button>
            <button onclick="playChaos()">混沌モード</button>
            <button onclick="resetSystem()" class="danger">塔を崩す</button>
        </div>

        <h3>【 システムログ 】</h3>
        <div id="log">ようこそ、バベルへ。</div>
    </div>

    <div class="bible">
        <strong>◆ BIBLE ◆</strong>
        <div id="bible-log" class="bible-log">
            ここに声の種から生まれた言葉が現れる。
        </div>
    </div>
</div>

<div class="footer">unfiltered 2026 Tokyo / Taipei</div>
<div class="scanline"></div>

<script>
let audioCtx;
let isHold = false;
let isSeq = false;
let seqInterval = null;
let currentLayers = 4;
let seqStep = 0;

const waveforms = ['sine', 'square', 'sawtooth', 'triangle', 'noise'];
const crazyNames = ["L5 ▶ 狂気の言語融合", "L6 ▶ 崩壊コーラス", "L7 ▶ 虚空の叫び", "L8 ▶ 無限バベル", "L9 ▶ 塔の怨念", "L10 ▶ 神の沈黙", "L11 ▶ 混沌の胎動", "L12 ▶ 最終未過濾"];
const bibleSeeds = ["塔は高く、天に届かんとする。","言葉は乱れ、人は散りゆく。","混沌の中より、新たな響きが生まれる。","聞け、未だ見えぬ声の叫びを。","我は音の源、永遠の未過濾。"];

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function createNoiseBuffer() {
    const bufferSize = audioCtx.sampleRate * 2;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2 - 1; }
    return buffer;
}

function playTone(freq, type, dur) {
    initAudio();
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    
    if (type === 'noise') {
        const noise = audioCtx.createBufferSource();
        noise.buffer = createNoiseBuffer();
        noise.connect(gain);
        noise.start();
        if (!isHold) gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        noise.stop(audioCtx.currentTime + (isHold ? 0.4 : dur));
    } else {
        const osc = audioCtx.createOscillator();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(gain);
        osc.start();
        if (!isHold) gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.stop(audioCtx.currentTime + (isHold ? 0.6 : dur));
    }
    gain.connect(audioCtx.destination);
}

function addLog(text) {
    const log = document.getElementById('log');
    log.innerHTML += `<br>> ${text}`;
    log.scrollTop = log.scrollHeight;
}

function playRandomWave(isFromSeq = false) {
    const type = waveforms[Math.floor(Math.random() * waveforms.length)];
    const freq = 100 + Math.random() * 900;
    playTone(freq, type, 0.3);
    animateTower();
    
    if (isFromSeq) {
        seqStep++;
        const typeName = type === 'noise' ? 'ノイズバースト' : type.toUpperCase();
        addLog(`[工程:${seqStep}] ${typeName} 抽出中...`);
    } else {
        const typeName = type === 'noise' ? 'ノイズ' : type.toUpperCase();
        addLog(`${typeName} 波形を生成 (${Math.round(freq)}Hz)`);
    }

    const bLog = document.getElementById('bible-log');
    bLog.innerHTML += `<br>> ${bibleSeeds[Math.floor(Math.random()*bibleSeeds.length)]}`;
    bLog.scrollTop = bLog.scrollHeight;
}

function toggleSeq() {
    isSeq = !isSeq;
    const btn = document.getElementById('seq-btn');
    if (isSeq) {
        btn.classList.add('active');
        btn.textContent = "SEQ: 稼働中";
        seqInterval = setInterval(() => playRandomWave(true), 150);
        addLog("シーケンサー 起動完了");
    } else {
        btn.classList.remove('active');
        btn.textContent = "シーケンサー";
        clearInterval(seqInterval);
        addLog("シーケンサー 停止");
    }
}

function toggleHold() {
    isHold = !isHold;
    document.getElementById('hold-btn').classList.toggle('active');
    addLog(isHold ? "持続モード：有効" : "持続モード：解除");
}

function buildTower() {
    const tower = document.getElementById('tower');
    const scroll = document.getElementById('tower-scroll');
    const bricks = ["█", "███", "█████", "███████", "█████████"];
    tower.innerHTML += "<br>" + bricks[Math.floor(Math.random() * bricks.length)];
    scroll.scrollTop = scroll.scrollHeight;
    addLog("塔の高度が上昇中...");
    playRandomWave();
}

function animateTower() {
    const t = document.getElementById('tower');
    t.classList.add('active');
    setTimeout(() => t.classList.remove('active'), 50);
}

function playChaos() {
    addLog("混沌プロトコル『Babel Chorus』実行");
    for (let i = 0; i < 12; i++) setTimeout(() => playRandomWave(), i * 65);
}

function resetSystem() {
    if (confirm('警告：システムを完全に初期化しますか？')) {
        location.reload();
    }
}

function addNewLayer() {
    if (currentLayers >= 12) {
        addLog("【警告】塔の限界に達しました (12/12)");
        return;
    }
    currentLayers++;
    document.getElementById('layer-count').textContent = `■ 現在のレイヤー (${currentLayers}/12)`;
    renderLayers();
    addLog(`新規レイヤー L${currentLayers} 接続完了`);
}

function renderLayers() {
    const container = document.getElementById('layers');
    container.innerHTML = '';
    for (let i = 1; i <= currentLayers; i++) {
        const div = document.createElement('div');
        div.className = 'layer';
        if (i <= 4) {
            const staticNames = ["", "UNFILTERED 未過濾的", "合成オシレーター", "混沌効果 (Babel Chorus)", "古代環境音"];
            div.innerHTML = `L${i} ▶ ${staticNames[i]}`;
        } else {
            div.innerHTML = crazyNames[i-5];
        }
        div.onclick = () => { addLog(`レイヤー L${i} 信号受信`); playRandomWave(); };
        container.appendChild(div);
    }
}

window.onload = renderLayers;
</script>
</body>
</html>
